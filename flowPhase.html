<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ESP32-S3 DAQ + 192k Sync Mic (Parametric Offset)</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --bg: #07090e; --surface: #0c1018; --surface2: #111822; --border: #192130;
  --accent: #38bdf8; --green: #34d399; --orange: #fb923c; --red: #f87171;
  --purple: #a78bfa; --yellow: #fbbf24; --text: #b8cfe0; --muted: #334d63;
  --grid: rgba(56,189,248,0.025);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;min-height:100vh;position:relative}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:48px 48px}
.wrap{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:30px 24px}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:30px;padding-bottom:20px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:14px}
.logo h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#fff}
.logo h1 em{color:var(--accent);font-style:normal}
.logo p{color:var(--muted);font-size:10px;margin-top:4px;letter-spacing:2.5px;text-transform:uppercase}
.conn-row{display:flex;align-items:center;gap:10px}
#ipInput, #delayInput{background:var(--surface2);border:1px solid var(--border);border-radius:3px;color:var(--text);padding:7px 12px;outline:none}
#ipInput{width:160px}
#delayInput{width:80px; color:var(--accent); font-weight:bold}
.ws-dot{width:8px;height:8px;border-radius:50%;background:var(--muted)}
.ws-dot.open{background:var(--green);box-shadow:0 0 8px var(--green)}
.ws-dot.err{background:var(--red)}
.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:20px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:13px 14px}
.sl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.sv{font-size:16px;font-weight:700;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sv.a{color:var(--accent)}.sv.g{color:var(--green)}.sv.p{color:var(--purple)}.sv.o{color:var(--orange)}.sv.y{color:var(--yellow)}
.controls{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
button{font-family:inherit;font-size:11px;font-weight:700;text-transform:uppercase;padding:11px 20px;border-radius:3px;cursor:pointer;background:var(--surface);transition:0.2s}
button:disabled{opacity:0.2;cursor:not-allowed}
#btnConnect{border:1px solid var(--accent);color:var(--accent)}
#btnStart{border:1px solid var(--green);color:var(--green)}
#btnStream{border:1px solid var(--purple);color:var(--purple)}
#btnDownload{border:1px solid var(--orange);color:var(--orange)}
#btnVisualize{border:1px solid var(--green);color:var(--green)}
.prog{margin-bottom:20px;display:none}
.prog.show{display:block}
.prog-top{display:flex;justify-content:space-between;margin-bottom:6px;font-size:9px;color:var(--muted)}
.prog-track{height:2px;background:var(--border);overflow:hidden}
.prog-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--green));transition:width 0.1s}
#log{background:var(--surface);border:1px solid var(--border);padding:10px;height:120px;overflow-y:auto;font-size:11px;margin-bottom:20px}
.ll.ok{color:var(--green)}.ll.err{color:var(--red)}.ll.y{color:var(--yellow)}
.chart-wrap{display:none;margin-bottom:30px}
.chart-wrap.show{display:block}
.chart-container{background:var(--surface);border:1px solid var(--border);margin-bottom:10px;padding:10px;height:250px}
.tbl-wrap{display:none}
.tbl-wrap.show{display:block}
.tbl-scroll{overflow:auto;max-height:280px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:11px}
thead th{background:var(--surface);padding:8px;text-align:right;color:var(--accent);position:sticky;top:0}
tbody td{padding:5px 8px;text-align:right;border-bottom:1px solid var(--border);color:var(--text)}
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="logo">
      <h1>ESP32<em>·</em>DAQ</h1>
      <p>ICM42670 + LTC2351 + 192k SYNC MIC</p>
    </div>
    <div class="conn-row">
      <span style="font-size:9px; color:var(--muted); text-transform:uppercase">Offset(ms):</span>
      <input id="delayInput" type="number" value="560">
      <input id="ipInput" type="text" value="10.42.89.182">
      <div class="ws-dot" id="wsDot"></div>
      <span id="wsState" style="font-size:10px; text-transform:uppercase; color:var(--muted)">Disconnected</span>
    </div>
  </header>

  <div class="stats">
    <div class="stat"><div class="sl">State</div><div class="sv a" id="sState">—</div></div>
    <div class="stat"><div class="sl">Samples</div><div class="sv g" id="sSamples">—</div></div>
    <div class="stat"><div class="sl">Packets</div><div class="sv p" id="sPkts">—</div></div>
    <div class="stat"><div class="sl">Speed</div><div class="sv a" id="sSpeed">—</div></div>
    <div class="stat"><div class="sl">Elapsed</div><div class="sv o" id="sElapsed">—</div></div>
    <div class="stat"><div class="sl">Session Start</div><div class="sv y" id="sStart">—</div></div>
  </div>

  <div class="controls">
    <button id="btnConnect">⬡ Connect</button>
    <button id="btnStart" disabled>▶ Start Sync</button>
    <button id="btnStream" disabled>⇄ Stream</button>
    <button id="btnDownload" disabled>↓ Save Files</button>
    <button id="btnVisualize" disabled>📈 Visualize</button>
  </div>

  <div class="prog" id="prog">
    <div class="prog-top"><span id="progLabel">Streaming</span><span id="progPct">0%</span></div>
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
  </div>

  <div id="log"></div>

  <div class="chart-wrap" id="chartWrap">
    <div class="chart-container"><canvas id="chartAdc0"></canvas></div>
    <div class="chart-container"><canvas id="chartAdc1"></canvas></div>
    <div class="chart-container"><canvas id="chartAdc2"></canvas></div>
    <div class="chart-container"><canvas id="chartAdc3"></canvas></div>
    <div class="chart-container"><canvas id="chartAdc4"></canvas></div>
    <div class="chart-container"><canvas id="chartImu"></canvas></div>
    <div class="chart-container"><canvas id="chartGyro"></canvas></div>
    <div class="chart-container"><canvas id="chartMic"></canvas></div>
  </div>

  <div class="tbl-wrap" id="tblWrap">
    <div class="tbl-scroll">
      <table>
        <thead><tr><th>#</th><th>Time (us)</th><th>ADC0</th><th>ADC1</th><th>ADC2</th><th>ADC3</th><th>ADC4</th><th>U0</th><th>U1</th><th>AX</th><th>AY</th><th>AZ</th><th>GX</th><th>GY</th><th>GZ</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const TARGET_SAMPLES = 192000;
const MIC_FREQ = 9600;
const FIELDS = 14;

let wsConn = null, samples = null, receivedCount = 0, pktsReceived = 0;
let streamStartTime = 0, speedTimer = null, charts = [];
let sessionTimestamp = "";

// Audio state
let audioCtx, mediaStream, processor, audioChunks = [];
let recordedBuffer = null;
let isRecordingActive = false;

function log(msg, cls='') {
  const t = new Date().toLocaleTimeString();
  $('log').innerHTML += `<div class="ll ${cls}"><span style="color:var(--muted);margin-right:8px">${t}</span>${msg}</div>`;
  $('log').scrollTop = $('log').scrollHeight;
}

function setWsState(s) {
  const isOpen = (s === 'open');
  $('wsDot').className = 'ws-dot ' + (isOpen ? 'open' : s === 'error' ? 'err' : '');
  $('wsState').textContent = s.toUpperCase();
  $('btnStream').disabled = !isOpen;
  $('btnStart').disabled = !isOpen;
}

$('btnConnect').onclick = () => {
  if (wsConn && wsConn.readyState === 1) { wsConn.close(); return; }
  wsConn = new WebSocket(`ws://${$('ipInput').value.trim()}:81`);
  wsConn.binaryType = 'arraybuffer';
  wsConn.onopen = () => { setWsState('open'); log('Connected','ok'); };
  wsConn.onclose = () => { setWsState('closed'); log('Disconnected'); clearInterval(speedTimer); };
  wsConn.onmessage = onMessage;
};

// SYNC START: Hardware Trigger + Parametric Delayed Mic Capture
$('btnStart').onclick = async () => {
  if (!wsConn || wsConn.readyState !== 1) return;
  
  const userDelay = parseInt($('delayInput').value) || 0;
  audioChunks = [];
  isRecordingActive = false;
  receivedCount = 0;
  
  const now = new Date();
  $('sStart').textContent = now.toLocaleTimeString();
  sessionTimestamp = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}-${String(now.getMinutes()).padStart(2,'0')}-${String(now.getSeconds()).padStart(2,'0')}`;

  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioCtx = new AudioContext();
    const source = audioCtx.createMediaStreamSource(mediaStream);
    processor = audioCtx.createScriptProcessor(4096, 1, 1);
    
    source.connect(processor);
    processor.connect(audioCtx.destination);

    // SEND START TO ESP32 IMMEDIATELY
    wsConn.send('Start');
    log("Command 'Start' sent to ESP32...", "ok");
    log(`Waiting ${userDelay}ms for mic trigger...`, "y");

    // START MIC DATA COLLECTION AFTER USER-DEFINED DELAY
    setTimeout(() => {
      isRecordingActive = true;
      log(`Mic Data Capture ON (${userDelay}ms offset active)`, "ok");
    }, userDelay);

    processor.onaudioprocess = (e) => {
      if (!isRecordingActive) return;

      audioChunks.push(new Float32Array(e.inputBuffer.getChannelData(0)));
      
      let currentRawLen = audioChunks.reduce((a, b) => a + b.length, 0);
      let requiredRawLen = (TARGET_SAMPLES / MIC_FREQ) * audioCtx.sampleRate;

      if (currentRawLen >= requiredRawLen) {
        stopMicRecording();
      }
    };
  } catch (e) {
    log("Mic Error: " + e.message, "err");
  }
};

async function stopMicRecording() {
  if (!isRecordingActive) return;
  isRecordingActive = false;
  
  if (processor) {
    processor.disconnect();
    mediaStream.getTracks().forEach(t => t.stop());
    log("Mic Capture Finished. Resampling...", "ok");

    let fullBuffer = new Float32Array(audioChunks.reduce((a, b) => a + b.length, 0));
    let offset = 0;
    for (let chunk of audioChunks) { fullBuffer.set(chunk, offset); offset += chunk.length; }

    const offlineCtx = new OfflineAudioContext(1, TARGET_SAMPLES, MIC_FREQ);
    const bufferSource = offlineCtx.createBufferSource();
    const audioBuffer = offlineCtx.createBuffer(1, fullBuffer.length, audioCtx.sampleRate);
    audioBuffer.copyToChannel(fullBuffer, 0);
    bufferSource.buffer = audioBuffer;
    bufferSource.connect(offlineCtx.destination);
    bufferSource.start();

    const rendered = await offlineCtx.startRendering();
    const resampled = rendered.getChannelData(0);

    recordedBuffer = new Float32Array(TARGET_SAMPLES);
    for (let i = 0; i < TARGET_SAMPLES; i++) {
      let val = resampled[i] !== undefined ? resampled[i] : 0;
      recordedBuffer[i] = Math.max(0, Math.min(4095, Math.round((val * 2047) + 2048)));
    }
    log("Mic Buffer Ready: 192,000 samples.", "ok");
  }
}

$('btnStream').onclick = () => {
  receivedCount = 0; pktsReceived = 0; samples = null;
  $('tbody').innerHTML = '';
  $('prog').classList.add('show');
  $('tblWrap').classList.add('show');
  $('chartWrap').classList.remove('show');
  wsConn.send('Stream');
};

function onMessage(evt) {
  if (evt.data instanceof ArrayBuffer) { handleBinary(evt.data); return; }
  const msg = JSON.parse(evt.data);
  if (msg.type === 'stream_start') {
    samples = new Float32Array(TARGET_SAMPLES * FIELDS);
    streamStartTime = performance.now();
    speedTimer = setInterval(() => {
      const el = (performance.now() - streamStartTime) / 1000;
      $('sSpeed').textContent = Math.round(receivedCount / el).toLocaleString() + '/s';
      $('sElapsed').textContent = el.toFixed(1) + 's';
    }, 500);
  } else if (msg.type === 'stream_end') {
    clearInterval(speedTimer);
    $('btnDownload').disabled = false;
    $('btnVisualize').disabled = false;
    $('sState').textContent = 'DONE';
    renderTable();
    log('Binary Stream Complete','ok');
  } else if (msg.type === 'status') {
    $('sState').textContent = msg.value;
  }
}

function handleBinary(buf) {
  const dv = new DataView(buf);
  const seq = dv.getUint16(0, true);
  const count = dv.getUint16(2, true);
  if (!samples) return;
  pktsReceived++;
  $('sPkts').textContent = pktsReceived.toLocaleString();
  const baseIdx = seq * 50;
  let off = 4;
  for (let i = 0; i < count; i++) {
    const si = baseIdx + i;
    if (si >= TARGET_SAMPLES) break;
    const b = si * FIELDS;
    samples[b+0] = dv.getUint32(off, true);
    samples[b+1] = dv.getUint16(off+4, true);  
    samples[b+2] = dv.getUint16(off+6, true);  
    samples[b+3] = dv.getUint16(off+8, true);  
    samples[b+4] = dv.getUint16(off+10, true); 
    samples[b+5] = dv.getUint16(off+12, true); 
    samples[b+6] = dv.getUint16(off+14, true); 
    samples[b+7] = dv.getUint16(off+16, true); 
    samples[b+8] = dv.getInt16(off+18, true) / 2048.0; 
    samples[b+9] = dv.getInt16(off+20, true) / 2048.0; 
    samples[b+10] = dv.getInt16(off+22, true) / 2048.0; 
    samples[b+11] = dv.getInt16(off+24, true) / 16.4;   
    samples[b+12] = dv.getInt16(off+26, true) / 16.4;   
    samples[b+13] = dv.getInt16(off+28, true) / 16.4;   
    off += 30;
    receivedCount = Math.max(receivedCount, si + 1);
  }
  $('sSamples').textContent = receivedCount.toLocaleString();
  const pct = Math.round((receivedCount/TARGET_SAMPLES)*100);
  $('progFill').style.width = pct + '%';
  $('progPct').textContent = pct + '%';
}

function renderTable() {
  const start = Math.max(0, receivedCount - 100);
  let h = '';
  for (let i = start; i < receivedCount; i++) {
    const b = i * FIELDS;
    h += `<tr><td>${i+1}</td><td>${samples[b]}</td><td>${samples[b+1]}</td><td>${samples[b+2]}</td><td>${samples[b+3]}</td><td>${samples[b+4]}</td><td>${samples[b+5]}</td><td>${samples[b+6]}</td><td>${samples[b+7]}</td><td>${samples[b+8].toFixed(2)}</td><td>${samples[b+9].toFixed(2)}</td><td>${samples[b+10].toFixed(2)}</td><td>${samples[b+11].toFixed(1)}</td><td>${samples[b+12].toFixed(1)}</td><td>${samples[b+13].toFixed(1)}</td></tr>`;
  }
  $('tbody').innerHTML = h;
}

$('btnVisualize').onclick = () => {
  $('chartWrap').classList.add('show');
  charts.forEach(c => c.destroy()); charts = [];
  const step = Math.max(1, Math.floor(receivedCount / 2000));
  const t=[], a0=[], a1=[], a2=[], a3=[], a4=[], imuX=[], imuY=[], imuZ=[], gX=[], gY=[], gZ=[];
  for (let i = 0; i < receivedCount; i += step) {
    const b = i * FIELDS;
    t.push((samples[b]/1000000).toFixed(2) + 's');
    a0.push(samples[b+1]); a1.push(samples[b+2]); a2.push(samples[b+3]);
    a3.push(samples[b+4]); a4.push(samples[b+5]);
    imuX.push(samples[b+8]); imuY.push(samples[b+9]); imuZ.push(samples[b+10]);
    gX.push(samples[b+11]); gY.push(samples[b+12]); gZ.push(samples[b+13]);
  }
  const opt = (title) => ({ responsive:true, maintainAspectRatio:false, elements:{point:{radius:0},line:{borderWidth:1}}, plugins:{title:{display:true,text:title,color:'#fff'},legend:{display:false}}, scales:{x:{ticks:{maxTicksLimit:10,color:'#334d63'}},y:{grid:{color:'#192130'},ticks:{color:'#b8cfe0'}}}});
  charts.push(new Chart($('chartAdc0'), { type:'line', data:{ labels:t, datasets:[{data:a0,borderColor:'#34d399'}] }, options:opt('ADC0') }));
  charts.push(new Chart($('chartAdc1'), { type:'line', data:{ labels:t, datasets:[{data:a1,borderColor:'#fb923c'}] }, options:opt('ADC1') }));
  charts.push(new Chart($('chartAdc2'), { type:'line', data:{ labels:t, datasets:[{data:a2,borderColor:'#f87171'}] }, options:opt('ADC2') }));
  charts.push(new Chart($('chartAdc3'), { type:'line', data:{ labels:t, datasets:[{data:a3,borderColor:'#a78bfa'}] }, options:opt('ADC3') }));
  charts.push(new Chart($('chartAdc4'), { type:'line', data:{ labels:t, datasets:[{data:a4,borderColor:'#fbbf24'}] }, options:opt('ADC4') }));
  charts.push(new Chart($('chartImu'),  { type:'line', data:{ labels:t, datasets:[{label:'AX',data:imuX,borderColor:'#38bdf8'},{label:'AY',data:imuY,borderColor:'#34d399'},{label:'AZ',data:imuZ,borderColor:'#fb923c'}] }, options:{...opt('ACCEL'),plugins:{legend:{display:true,labels:{color:'#fff'}}}} }));
  charts.push(new Chart($('chartGyro'), { type:'line', data:{ labels:t, datasets:[{label:'GX',data:gX,borderColor:'#a78bfa'},{label:'GY',data:gY,borderColor:'#fbbf24'},{label:'GZ',data:gZ,borderColor:'#f87171'}] }, options:{...opt('GYRO'),plugins:{legend:{display:true,labels:{color:'#fff'}}}} }));
  if (recordedBuffer) {
    let mD=[], mL=[]; let mStep = Math.floor(recordedBuffer.length/2000);
    for(let i=0;i<recordedBuffer.length;i+=mStep){ mD.push(recordedBuffer[i]); mL.push(""); }
    charts.push(new Chart($('chartMic'), { type:'line', data:{ labels:mL, datasets:[{data:mD,borderColor:'#f87171'}] }, options:opt('MIC (SYNC 192k)') }));
  }
};

$('btnDownload').onclick = () => {
  if (!samples || receivedCount === 0) return;
  const prefix = sessionTimestamp || "daq_data";
  const currentDelay = $('delayInput').value || "0";
  
  let s = 'ts_us,adc0,adc1,adc2,adc3,adc4,u0,u1,ax,ay,az,gx,gy,gz,mic_12bit\n';
  for (let i=0; i<TARGET_SAMPLES; i++) {
    const b = i * FIELDS;
    const micVal = recordedBuffer ? recordedBuffer[i] : 0;
    s += `${samples[b]||0},${samples[b+1]||0},${samples[b+2]||0},${samples[b+3]||0},${samples[b+4]||0},${samples[b+5]||0},${samples[b+6]||0},${samples[b+7]||0},${(samples[b+8]||0).toFixed(4)},${(samples[b+9]||0).toFixed(4)},${(samples[b+10]||0).toFixed(4)},${(samples[b+11]||0).toFixed(2)},${(samples[b+12]||0).toFixed(2)},${(samples[b+13]||0).toFixed(2)},${micVal}\n`;
  }
  const csvBlob = new Blob([s], {type:'text/csv'});
  const aCsv = document.createElement('a'); 
  aCsv.href = URL.createObjectURL(csvBlob); 
  aCsv.download = `${prefix}_sync_${currentDelay}ms.csv`; 
  aCsv.click();
  log(`Downloaded CSV with ${currentDelay}ms offset label.`, "ok");
};
</script>
</body>
</html>
